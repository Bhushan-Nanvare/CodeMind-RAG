services:
  - type: web
    name: codemind-api
    env: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: GIT_PYTHON_REFRESH
        value: quiet
      - key: PYTHONPATH
        value: /app
    autoDeploy: true
